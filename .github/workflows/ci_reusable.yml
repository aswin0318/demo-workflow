name: CI reusable

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      actor:
        required: true
        type: string
      repo:
        required: true
        type: string
      commit_id:
        required: true
        type: string

jobs:
  job1:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "called branch is ${{ inputs.branch }}"
      - run: echo "actor is ${{ inputs.actor }}" 
      - run: echo "repo is ${{ inputs.repo }}"
      - run: echo "commit_id is ${{ inputs.commit_id }}"
